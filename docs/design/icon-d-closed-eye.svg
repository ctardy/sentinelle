<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="512" height="512">
  <title>Sentinelle — Icon D — Closed eye with lock</title>
  <!-- Background -->
  <rect width="108" height="108" fill="#0F172A"/>
  <!-- Closed eye curve (upper eyelid) -->
  <path
    d="M26 58
       Q54 34 82 58"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="6"
    stroke-linecap="round"/>
  <!-- Eyelashes (decorative) -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
    <line x1="36" y1="56" x2="31" y2="64"/>
    <line x1="46" y1="48" x2="43" y2="58"/>
    <line x1="54" y1="46" x2="54" y2="56"/>
    <line x1="62" y1="48" x2="65" y2="58"/>
    <line x1="72" y1="56" x2="77" y2="64"/>
  </g>
  <!-- Padlock (small, nested below eye) -->
  <g>
    <!-- Shackle -->
    <path
      d="M49 70
         V65
         C49 61 52 58 54 58
         C56 58 59 61 59 65
         V70"
      fill="none"
      stroke="#F59E0B"
      stroke-width="3"
      stroke-linecap="round"/>
    <!-- Body -->
    <rect x="45" y="70" width="18" height="14" rx="2" fill="#F59E0B"/>
    <!-- Keyhole -->
    <circle cx="54" cy="76" r="1.8" fill="#0F172A"/>
    <rect x="53.2" y="76" width="1.6" height="4" fill="#0F172A"/>
  </g>
</svg>
